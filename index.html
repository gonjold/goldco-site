<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#020202}
body{font-family:'Plus Jakarta Sans',sans-serif;color:#fff}
canvas{position:fixed;top:0;left:0;z-index:0}
.ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}
.wm{font-size:28px;font-weight:600;letter-spacing:6px;color:rgba(255,255,255,0.9);opacity:0;transform:translateY(14px);transition:opacity 1.8s ease,transform 1.8s ease;margin-top:340px;user-select:none}
.wm.on{opacity:1;transform:translateY(0)}
.wm.off{opacity:0;transform:translateY(-20px);transition:opacity 0.5s,transform 0.5s}
.sub{position:absolute;bottom:112px;font-size:10px;font-weight:400;letter-spacing:5px;color:rgba(255,255,255,0.13);opacity:0;transition:opacity 3s;text-transform:lowercase;user-select:none}
.sub.on{opacity:1}
.sub.off{opacity:0;transition:opacity 0.4s}
.cta-zone{position:absolute;bottom:46px;pointer-events:auto;cursor:pointer;padding:18px 36px;user-select:none}
.cta-inner{opacity:0;transition:opacity 2s}
.cta-inner.on{opacity:1}
.cta-inner.off{opacity:0;pointer-events:none;transition:opacity 0.4s}
.cta-t{font-size:10px;font-weight:400;letter-spacing:8px;color:rgba(255,255,255,0.15);text-transform:lowercase;transition:color 0.6s,letter-spacing 0.9s cubic-bezier(0.23,1,0.32,1)}
.cta-zone:hover .cta-t{color:#C9A84C;letter-spacing:14px}
.cta-l{width:0;height:1px;background:linear-gradient(90deg,transparent,#C9A84C,transparent);margin:8px auto 0;transition:width 0.9s cubic-bezier(0.23,1,0.32,1);opacity:0.6}
.cta-zone:hover .cta-l{width:100%}
.co{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.co.on{pointer-events:auto;opacity:1;transition:opacity 0.5s ease 2s}
.fv{width:100%;max-width:380px;padding:0 24px;opacity:0;transform:translateY(30px) scale(0.95);transition:opacity 1.2s ease 2.4s,transform 1.2s cubic-bezier(0.23,1,0.32,1) 2.4s}
.co.on .fv{opacity:1;transform:translateY(0) scale(1)}
.fv input,.fv textarea{width:100%;padding:16px 0;background:none;border:none;border-bottom:1px solid rgba(255,255,255,0.15);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:300;letter-spacing:0.5px;outline:none;margin-bottom:28px;transition:border-color 0.5s;-webkit-appearance:none;border-radius:0}
.fv input::placeholder,.fv textarea::placeholder{color:rgba(255,255,255,0.25)}
.fv input:focus,.fv textarea:focus{border-bottom-color:#C9A84C}
.fv textarea{resize:none;min-height:60px;line-height:1.6}
.fb{display:inline-flex;align-items:center;gap:14px;background:none;border:none;color:#C9A84C;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:5px;cursor:pointer;padding:12px 0;transition:gap 0.5s,letter-spacing 0.5s;text-transform:lowercase}
.fb:hover{gap:22px;letter-spacing:7px}
.fa{display:inline-block;width:24px;height:1px;background:#C9A84C;position:relative;transition:width 0.5s}
.fb:hover .fa{width:36px}
.fa::after{content:'';position:absolute;right:-1px;top:-3px;width:7px;height:7px;border-right:1px solid #C9A84C;border-top:1px solid #C9A84C;transform:rotate(45deg)}
.fe{display:block;margin-top:48px;font-size:10px;color:rgba(255,255,255,0.18);letter-spacing:3px;text-decoration:none;transition:color 0.4s}
.fe:hover{color:#C9A84C}
.bk{position:fixed;top:28px;left:28px;z-index:110;color:rgba(255,255,255,0.12);font-size:10px;letter-spacing:3px;cursor:pointer;opacity:0;pointer-events:none;transition:opacity 0.5s ease 2.8s,color 0.3s;text-transform:lowercase;user-select:none}
.bk.on{opacity:1;pointer-events:auto}
.bk:hover{color:#C9A84C}
.ok{display:none;text-align:center}
.ok.on{display:block}
.ok h3{font-size:16px;font-weight:500;color:#C9A84C;letter-spacing:4px;margin-bottom:10px;text-transform:lowercase}
.ok p{font-size:12px;color:rgba(255,255,255,0.2);letter-spacing:1px}
.ff{transition:opacity 0.3s}
.ff.off{opacity:0;pointer-events:none;display:none}
@media(max-width:600px){.wm{font-size:20px;margin-top:200px;letter-spacing:4px}.fv{max-width:300px}}
</style>
</head>
<body>
<div class="ui" id="ui">
<div class="wm" id="wm">GOLD CO</div>
<div class="sub" id="sub">still loading</div>
<div class="cta-zone" onclick="go()"><div class="cta-inner" id="cta"><div class="cta-t">start a project</div><div class="cta-l"></div></div></div>
</div>
<div class="co" id="co">
<div class="fv">
<div class="ff" id="ff">
<input type="text" id="fn" placeholder="name" autocomplete="name">
<input type="email" id="em" placeholder="email" autocomplete="email">
<textarea id="mg" placeholder="tell us about your project" rows="2"></textarea>
<button class="fb" onclick="send()">send<span class="fa"></span></button>
</div>
<div class="ok" id="ok"><h3>sent</h3><p>we'll be in touch</p></div>
<a href="mailto:jon@jgoldco.com" class="fe">jon@jgoldco.com</a>
</div>
</div>
<div class="bk" id="bk" onclick="back()">back</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   GOLD CO — IMMERSIVE 3D LANDING
   ============================================================ */
var W=innerWidth,H=innerHeight,PI=Math.PI;

// --- SCENE ---
var scene=new THREE.Scene();
var cam=new THREE.PerspectiveCamera(45,W/H,0.1,500);
cam.position.set(0,0,11);
var ren=new THREE.WebGLRenderer({antialias:true});
ren.setSize(W,H);ren.setPixelRatio(Math.min(devicePixelRatio,2));
ren.setClearColor(0x020202);
ren.toneMapping=THREE.ACESFilmicToneMapping;
ren.toneMappingExposure=1.5;
document.body.prepend(ren.domElement);

// --- LIGHTS (7 sources for cinematic gold) ---
scene.add(new THREE.AmbientLight(0x080808,0.5));
var L=[];
function pl(c,i,d,x,y,z){var l=new THREE.PointLight(c,i,d);l.position.set(x,y,z);scene.add(l);L.push(l);return l}
var lKey=pl(0xC9A84C,5,30,  3,2.5,8);
var lFil=pl(0xFFD700,2.5,22, -3,3,6);
var lR1 =pl(0xC9A84C,3,16,  -5,-1,1);
var lR2 =pl(0x8B6914,2,22,   4,-3,2);
var lTop=pl(0xFFD700,1.2,28,  0,6,4);
var lBk =pl(0xC9A84C,2,18,   0,-1,-5);
var lFr =pl(0xC9A84C,0.8,15, 0,0,14);

// --- MATERIALS ---
function gm(m,r,ei){return new THREE.MeshStandardMaterial({color:0xC9A84C,metalness:m,roughness:r,emissive:0x4A3510,emissiveIntensity:ei})}
var matC=gm(0.94,0.12,0.35);
var matO=gm(0.94,0.18,0.2);
var matG=gm(0.92,0.14,0.3);

// --- LOGO (flat sharp strokes, correct orientation) ---
var logo = new THREE.Group();
var R = 2.0;

// Helper: flat arc band (like SVG stroke as 3D shape)
function makeArc(radius, strokeW, startDeg, endDeg, depth) {
  var sh = new THREE.Shape();
  var inner = radius - strokeW / 2;
  var outer = radius + strokeW / 2;
  var steps = 128;
  var s = startDeg * Math.PI / 180;
  var e = endDeg * Math.PI / 180;
  var span = e - s;
  for (var i = 0; i <= steps; i++) {
    var a = s + (i / steps) * span;
    var x = Math.cos(a) * outer, y = Math.sin(a) * outer;
    if (i === 0) sh.moveTo(x, y); else sh.lineTo(x, y);
  }
  for (var i = steps; i >= 0; i--) {
    var a = s + (i / steps) * span;
    sh.lineTo(Math.cos(a) * inner, Math.sin(a) * inner);
  }
  sh.closePath();
  return new THREE.ExtrudeGeometry(sh, { depth: depth, bevelEnabled: false });
}

// C arc: bold, from -70° to 250° (sweeps 320° = leaves 40° gap... no)
// We want ~220° of bold arc. Gap is ~140° on the right side.
// Gap from -70° to +70° (centered on 0° which is the right side)
// C arc goes from 70° to 290° (= 220° sweep, CCW through top-left-bottom)
var cGeo = makeArc(R, 0.26, 70, 290, 0.07);
var cMesh = new THREE.Mesh(cGeo, matC);
cMesh.position.z = -0.035;
logo.add(cMesh);

// O arc: thin, from 290° to 430° (= 70° + 360°) — fills the remaining gap on right side
var oGeo = makeArc(R, 0.06, 290, 430, 0.04);
var oMesh = new THREE.Mesh(oGeo, matO);
oMesh.position.z = -0.02;
logo.add(oMesh);

// G element: ┐ shape using BoxGeometry (perfectly sharp edges)
var hLen = R * 0.35;   // horizontal bar length
var vLen = R * 0.32;   // vertical bar drop
var gThick = 0.12;     // stroke thickness (visual weight)
var gDepth = 0.07;     // extrusion depth (same as C arc)

// The G's right edge aligns with C arc endpoints
// C endpoints are at 70° and 290° on circle of radius R
// At 70°: x = R * cos(70°) = 2.0 * 0.342 = 0.684
// Horizontal bar: centered vertically at y = 0 (center diameter)
var endX = R * Math.cos(70 * Math.PI / 180); // ≈ 0.684

// Horizontal bar of ┐
var hBar = new THREE.Mesh(
  new THREE.BoxGeometry(hLen, gThick, gDepth),
  matG
);
hBar.position.set(endX - hLen / 2, 0, 0);
logo.add(hBar);

// Vertical bar of ┐ — top edge flush with top edge of horizontal bar
var vBar = new THREE.Mesh(
  new THREE.BoxGeometry(gThick, vLen, gDepth),
  matG
);
vBar.position.set(endX, -(vLen / 2) + (gThick / 2), 0);
logo.add(vBar);

scene.add(logo);

// --- PARTICLES: LAYER 1 — CLOSE ATMOSPHERE (400) ---
var N1=400;
var g1=new THREE.BufferGeometry();
var p1=new Float32Array(N1*3),s1=new Float32Array(N1),sp1=new Float32Array(N1);
var p1Home=new Float32Array(N1*3);
for(var i=0;i<N1;i++){
  var th=Math.random()*PI*2,ph=Math.acos(2*Math.random()-1);
  var r2=3+Math.random()*18;
  var x=r2*Math.sin(ph)*Math.cos(th),y=r2*Math.sin(ph)*Math.sin(th),z=r2*Math.cos(ph)-2;
  p1[i*3]=x;p1[i*3+1]=y;p1[i*3+2]=z;
  p1Home[i*3]=x;p1Home[i*3+1]=y;p1Home[i*3+2]=z;
  s1[i]=1.5+Math.random()*4;
  sp1[i]=0.15+Math.random()*0.6;
}
g1.setAttribute('position',new THREE.BufferAttribute(p1,3));
g1.setAttribute('size',new THREE.BufferAttribute(s1,1));
var sm=new THREE.ShaderMaterial({
  vertexShader:'attribute float size;varying float vA;void main(){vec4 mv=modelViewMatrix*vec4(position,1.);float d=-mv.z;vA=clamp(1.-d/50.,0.03,0.7);gl_PointSize=size*(7./max(d,0.5));gl_Position=projectionMatrix*mv;}',
  fragmentShader:'varying float vA;void main(){float d=length(gl_PointCoord-vec2(.5));if(d>.5)discard;float a=smoothstep(.5,.05,d)*vA;gl_FragColor=vec4(.79,.66,.3,a);}',
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
});
scene.add(new THREE.Points(g1,sm));

// --- PARTICLES: LAYER 2 — DEEP DUST (1000) ---
var N2=1000;
var g2=new THREE.BufferGeometry();
var p2=new Float32Array(N2*3),s2=new Float32Array(N2);
for(var i=0;i<N2;i++){
  p2[i*3]=(Math.random()-.5)*140;
  p2[i*3+1]=(Math.random()-.5)*140;
  p2[i*3+2]=(Math.random()-.5)*180-20;
  s2[i]=0.3+Math.random()*1.8;
}
g2.setAttribute('position',new THREE.BufferAttribute(p2,3));
g2.setAttribute('size',new THREE.BufferAttribute(s2,1));
var sm2=new THREE.ShaderMaterial({
  vertexShader:'attribute float size;varying float vA;void main(){vec4 mv=modelViewMatrix*vec4(position,1.);float d=-mv.z;vA=clamp(1.-d/80.,0.01,0.35);gl_PointSize=size*(5./max(d,1.));gl_Position=projectionMatrix*mv;}',
  fragmentShader:'varying float vA;void main(){float d=length(gl_PointCoord-vec2(.5));if(d>.5)discard;gl_FragColor=vec4(.79,.66,.3,smoothstep(.5,.1,d)*vA);}',
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
});
scene.add(new THREE.Points(g2,sm2));

// --- PARTICLES: LAYER 3 — FOREGROUND BOKEH (60) ---
var N3=60;
var g3=new THREE.BufferGeometry();
var p3=new Float32Array(N3*3),s3=new Float32Array(N3);
for(var i=0;i<N3;i++){
  p3[i*3]=(Math.random()-.5)*24;
  p3[i*3+1]=(Math.random()-.5)*18;
  p3[i*3+2]=3+Math.random()*9;
  s3[i]=4+Math.random()*8;
}
g3.setAttribute('position',new THREE.BufferAttribute(p3,3));
g3.setAttribute('size',new THREE.BufferAttribute(s3,1));
var sm3=new THREE.ShaderMaterial({
  vertexShader:'attribute float size;varying float vA;void main(){vec4 mv=modelViewMatrix*vec4(position,1.);float d=-mv.z;vA=clamp(1.-d/20.,0.01,0.12);gl_PointSize=size*(8./max(d,0.3));gl_Position=projectionMatrix*mv;}',
  fragmentShader:'varying float vA;void main(){float d=length(gl_PointCoord-vec2(.5));if(d>.5)discard;gl_FragColor=vec4(.79,.66,.3,smoothstep(.5,.2,d)*vA);}',
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
});
scene.add(new THREE.Points(g3,sm3));

// --- MOUSE ---
var mx=0,my=0,smx=0,smy=0;
document.addEventListener('mousemove',function(e){
  mx=(e.clientX/W)*2-1;my=-(e.clientY/H)*2+1;
});
// Touch
document.addEventListener('touchmove',function(e){
  if(e.touches.length){mx=(e.touches[0].clientX/W)*2-1;my=-(e.touches[0].clientY/H)*2+1;}
},{passive:true});

// Raycaster for particle repulsion
var rc=new THREE.Raycaster();
var mPlane=new THREE.Plane(new THREE.Vector3(0,0,1),0);
var mWorld=new THREE.Vector3();

// --- STATE ---
var state='idle',tStart=0,TD=3500;
var camS=new THREE.Vector3(0,0,11);
var camE=new THREE.Vector3(0.2,0,-60);
var c1=new THREE.Vector3(2.5,1.2,-5);
var c2=new THREE.Vector3(-2,-1,-35);
var r1=new THREE.Vector3(-2,-0.8,-35);
var r2p=new THREE.Vector3(1.5,0.8,-5);

function bez(t,a,b,c,d){
  var m=1-t;
  return new THREE.Vector3(
    m*m*m*a.x+3*m*m*t*b.x+3*m*t*t*c.x+t*t*t*d.x,
    m*m*m*a.y+3*m*m*t*b.y+3*m*t*t*c.y+t*t*t*d.y,
    m*m*m*a.z+3*m*m*t*b.z+3*m*t*t*c.z+t*t*t*d.z
  );
}
function ease(t){return t<.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2}

// --- UI ---
setTimeout(function(){document.getElementById('wm').classList.add('on')},2000);
setTimeout(function(){document.getElementById('sub').classList.add('on')},3500);
setTimeout(function(){document.getElementById('cta').classList.add('on')},4200);

function go(){
  if(state!=='idle')return;state='trans';tStart=performance.now();
  document.getElementById('wm').className='wm off';
  document.getElementById('sub').className='sub off';
  document.getElementById('cta').className='cta-inner off';
  setTimeout(function(){
    document.getElementById('co').classList.add('on');
    document.getElementById('bk').classList.add('on');
    state='form';
  },TD);
}
function back(){
  if(state!=='form')return;state='ret';tStart=performance.now();
  document.getElementById('co').classList.remove('on');
  document.getElementById('bk').classList.remove('on');
  setTimeout(function(){
    document.getElementById('wm').className='wm on';
    document.getElementById('sub').className='sub on';
    document.getElementById('cta').className='cta-inner on';
    state='idle';
  },TD);
}
function send(){
  var n=document.getElementById('fn').value,e=document.getElementById('em').value,m=document.getElementById('mg').value;
  if(!n||!e)return;
  window.location.href='mailto:jon@jgoldco.com?subject='+encodeURIComponent('Project inquiry from '+n)+'&body='+encodeURIComponent('Name: '+n+'\nEmail: '+e+'\n\n'+m);
  document.getElementById('ff').className='ff off';
  document.getElementById('ok').className='ok on';
}

// --- RENDER ---
var clk=new THREE.Clock();
function frame(){
  requestAnimationFrame(frame);
  var t=clk.getElapsedTime();

  // Smooth mouse
  smx+=(mx-smx)*0.03;
  smy+=(my-smy)*0.03;

  // Logo
  logo.rotation.y=t*0.08+smx*0.15;
  logo.rotation.x=Math.sin(t*0.06)*0.1+smy*0.12;
  logo.rotation.z=Math.sin(t*0.1)*0.03+smx*0.05;
  logo.position.y=Math.sin(t*0.3)*0.05;

  // Particle drift (layer 1)
  var pp=g1.attributes.position.array;
  // Mouse world position for repulsion
  rc.setFromCamera(new THREE.Vector2(mx,my),cam);
  if(rc.ray.intersectPlane(mPlane,mWorld)){
    for(var i=0;i<N1;i++){
      var ix=i*3,iy=i*3+1,iz=i*3+2;
      // drift
      pp[ix]+=Math.cos(t*0.08+i*0.3)*0.003*sp1[i];
      pp[iy]+=Math.sin(t*0.1+i*0.5)*0.004*sp1[i];
      pp[iz]+=Math.sin(t*0.06+i*0.7)*0.002*sp1[i];
      // repulsion
      var dx=pp[ix]-mWorld.x,dy=pp[iy]-mWorld.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<3&&dist>0.01){
        var force=(3-dist)*0.008;
        pp[ix]+=dx/dist*force;
        pp[iy]+=dy/dist*force;
      }
      // gentle return toward home
      pp[ix]+=(p1Home[ix]-pp[ix])*0.001;
      pp[iy]+=(p1Home[iy]-pp[iy])*0.001;
      pp[iz]+=(p1Home[iz]-pp[iz])*0.001;
    }
  }
  g1.attributes.position.needsUpdate=true;

  // Particle drift (layer 2)
  var pp2=g2.attributes.position.array;
  for(var i=0;i<N2;i++){
    pp2[i*3+1]+=Math.sin(t*0.05+i)*0.002;
    pp2[i*3]+=Math.cos(t*0.04+i*0.3)*0.001;
  }
  g2.attributes.position.needsUpdate=true;

  // Bokeh drift (layer 3)
  var pp3=g3.attributes.position.array;
  for(var i=0;i<N3;i++){
    pp3[i*3]+=Math.sin(t*0.02+i*2)*0.004;
    pp3[i*3+1]+=Math.cos(t*0.03+i*1.5)*0.003;
  }
  g3.attributes.position.needsUpdate=true;

  // Camera
  if(state==='idle'){
    cam.position.x=smx*1.2;
    cam.position.y=smy*0.8;
    cam.position.z=11+Math.sin(t*0.25)*0.2;
    cam.lookAt(0,0,0);
  }else if(state==='trans'){
    var el=performance.now()-tStart;
    var p=Math.min(el/TD,1),e2=ease(p);
    var pos=bez(e2,camS,c1,c2,camE);
    pos.x+=Math.sin(e2*PI*3)*0.5*(1-e2);
    pos.y+=Math.sin(e2*PI*2.2)*0.3*(1-e2);
    pos.x+=smx*1.2*(1-e2);
    pos.y+=smy*0.8*(1-e2);
    cam.position.copy(pos);
    var lp=Math.min(e2+0.04,1);
    cam.lookAt(bez(lp,camS,c1,c2,camE));
  }else if(state==='form'){
    cam.position.x=Math.sin(t*0.03)*0.2+smx*0.3;
    cam.position.y=Math.cos(t*0.025)*0.12+smy*0.2;
    cam.position.z=-60;
    cam.lookAt(0,0,-65);
  }else if(state==='ret'){
    var el=performance.now()-tStart;
    var p=Math.min(el/TD,1),e2=ease(p);
    var pos=bez(e2,camE,r1,r2p,camS);
    pos.x+=Math.sin(e2*PI*2.5)*0.4*e2;
    pos.y+=Math.sin(e2*PI*1.8)*0.25*e2;
    cam.position.copy(pos);
    var lp=Math.min(e2+0.04,1);
    cam.lookAt(bez(lp,camE,r1,r2p,camS));
  }

  // Dynamic lights follow camera slightly
  lKey.position.set(cam.position.x+3,cam.position.y+2.5,cam.position.z+6);
  lFil.position.set(cam.position.x-3,cam.position.y+3,cam.position.z+4);
  lFr.position.set(cam.position.x,cam.position.y,cam.position.z+3);

  ren.render(scene,cam);
}
frame();

// Resize
addEventListener('resize',function(){
  W=innerWidth;H=innerHeight;
  cam.aspect=W/H;cam.updateProjectionMatrix();
  ren.setSize(W,H);
});
</script>
</body>
