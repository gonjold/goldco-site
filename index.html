<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Co</title>
<meta name="description" content="Gold Co — websites, marketing, and digital strategy for local businesses.">
<meta property="og:title" content="Gold Co">
<meta property="og:description" content="Websites, marketing, and digital strategy for local businesses.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://jgoldco.com">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cpath d='M126,29 A76,76 0 1,0 126,171' fill='none' stroke='%23C9A84C' stroke-width='8' stroke-linecap='round'/%3E%3Cpath d='M126,171 A76,76 0 0,0 126,29' fill='none' stroke='%23C9A84C' stroke-width='2' stroke-linecap='round'/%3E%3Cpolyline points='99.4,100 126,100 126,124.3' fill='none' stroke='%23C9A84C' stroke-width='6' stroke-linecap='square' stroke-linejoin='miter'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#020202}
body{font-family:'Plus Jakarta Sans',sans-serif;color:#fff;cursor:default}
canvas{position:fixed;top:0;left:0;z-index:0}

.ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}

.wordmark{
  font-size:30px;font-weight:600;letter-spacing:6px;color:rgba(255,255,255,0.9);
  opacity:0;transform:translateY(15px);
  transition:opacity 1.8s ease,transform 1.8s ease;
  margin-top:260px;user-select:none
}
.wordmark.show{opacity:0.9;transform:translateY(0)}
.wordmark.hide{opacity:0;transform:translateY(-20px);transition:opacity 0.5s ease,transform 0.5s ease}

.status{
  position:absolute;bottom:115px;
  font-size:10px;font-weight:400;letter-spacing:5px;color:rgba(255,255,255,0.12);
  opacity:0;transition:opacity 3s ease;text-transform:lowercase;user-select:none
}
.status.show{opacity:1}
.status.hide{opacity:0;transition:opacity 0.4s ease}

.cta{
  position:absolute;bottom:48px;
  pointer-events:auto;cursor:pointer;padding:20px 40px;user-select:none
}
.cta-text{
  font-size:11px;font-weight:400;letter-spacing:8px;color:rgba(255,255,255,0.15);
  text-transform:lowercase;
  transition:color 0.9s cubic-bezier(0.23,1,0.32,1),letter-spacing 0.9s cubic-bezier(0.23,1,0.32,1)
}
.cta:hover .cta-text{color:#C9A84C;letter-spacing:14px}
.cta-line{
  width:0;height:0.5px;
  background:linear-gradient(90deg,transparent,#C9A84C,transparent);
  margin:8px auto 0;
  transition:width 0.9s cubic-bezier(0.23,1,0.32,1)
}
.cta:hover .cta-line{width:100%}
.cta-wrap{opacity:0;transition:opacity 2s ease}
.cta-wrap.show{opacity:1}
.cta-wrap.hide{opacity:0;pointer-events:none;transition:opacity 0.4s ease}

.contact{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0
}
.contact.active{pointer-events:auto;opacity:1;transition:opacity 0.5s ease 1.8s}

.form-void{
  width:100%;max-width:400px;padding:0 24px;
  opacity:0;transform:translateY(30px) scale(0.95);
  transition:opacity 1.2s ease 2.2s,transform 1.2s cubic-bezier(0.23,1,0.32,1) 2.2s
}
.contact.active .form-void{opacity:1;transform:translateY(0) scale(1)}

.form-void input,.form-void textarea{
  width:100%;padding:18px 0;background:none;border:none;
  border-bottom:1px solid rgba(255,255,255,0.06);color:#fff;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:300;
  letter-spacing:0.5px;outline:none;margin-bottom:28px;
  transition:border-color 0.5s ease;-webkit-appearance:none;border-radius:0
}
.form-void input::placeholder,.form-void textarea::placeholder{color:rgba(255,255,255,0.12);font-weight:300}
.form-void input:focus,.form-void textarea:focus{border-bottom-color:#C9A84C}
.form-void textarea{resize:none;min-height:60px;line-height:1.6}

.form-send{
  display:inline-flex;align-items:center;gap:14px;
  background:none;border:none;color:#C9A84C;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:5px;cursor:pointer;padding:12px 0;
  transition:gap 0.5s ease,letter-spacing 0.5s ease;text-transform:lowercase
}
.form-send:hover{gap:22px;letter-spacing:7px}
.form-arrow{
  display:inline-block;width:24px;height:1px;background:#C9A84C;
  position:relative;transition:width 0.5s ease
}
.form-send:hover .form-arrow{width:36px}
.form-arrow::after{
  content:'';position:absolute;right:-1px;top:-3px;
  width:7px;height:7px;border-right:1px solid #C9A84C;border-top:1px solid #C9A84C;
  transform:rotate(45deg)
}

.form-email{
  display:block;margin-top:48px;font-size:10px;color:rgba(255,255,255,0.08);
  letter-spacing:3px;text-decoration:none;transition:color 0.4s ease
}
.form-email:hover{color:#C9A84C}

.back{
  position:fixed;top:28px;left:28px;z-index:110;
  color:rgba(255,255,255,0.1);font-size:10px;letter-spacing:3px;cursor:pointer;
  opacity:0;pointer-events:none;transition:opacity 0.5s ease 2.5s,color 0.3s ease;
  text-transform:lowercase;user-select:none
}
.back.show{opacity:1;pointer-events:auto}
.back:hover{color:#C9A84C}

.success{display:none;text-align:center}
.success.show{display:block}
.success h3{font-size:16px;font-weight:500;color:#C9A84C;letter-spacing:4px;margin-bottom:10px;text-transform:lowercase}
.success p{font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:1px}
.fields{transition:opacity 0.3s}
.fields.hide{opacity:0;pointer-events:none;display:none}

@media(max-width:600px){
  .wordmark{font-size:22px;margin-top:180px;letter-spacing:4px}
  .form-void{max-width:320px}
  .status,.cta-text{font-size:9px}
}
</style>
</head>
<body>

<div class="ui" id="ui">
  <div class="wordmark" id="wordmark">Gold Co</div>
  <div class="status" id="status">building something</div>
  <div class="cta" id="cta" onclick="enterContact()">
    <div class="cta-wrap" id="cta-wrap">
      <div class="cta-text">start a project</div>
      <div class="cta-line"></div>
    </div>
  </div>
</div>

<div class="contact" id="contact">
  <div class="form-void">
    <div class="fields" id="fields">
      <input type="text" id="f-name" placeholder="name" autocomplete="name">
      <input type="email" id="f-email" placeholder="email" autocomplete="email">
      <textarea id="f-msg" placeholder="tell us about your project" rows="2"></textarea>
      <button class="form-send" onclick="sendForm()">send<span class="form-arrow"></span></button>
    </div>
    <div class="success" id="success">
      <h3>sent</h3>
      <p>we'll be in touch</p>
    </div>
    <a href="mailto:jon@jgoldco.com" class="form-email">jon@jgoldco.com</a>
  </div>
</div>

<div class="back" id="back" onclick="exitContact()">back</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ── Scene setup ── */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020202, 0.025);
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 0, 5);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x020202);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;
document.body.prepend(renderer.domElement);

/* ── Mouse tracking ── */
const mouse = { x: 0, y: 0 };
const smoothMouse = { x: 0, y: 0 };
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

document.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

if (isMobile) {
  let touchStartX = 0, touchStartY = 0;
  document.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1) {
      mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
    }
  }, { passive: true });

  if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', (e) => {
      if (e.gamma !== null && e.beta !== null) {
        mouse.x = Math.max(-1, Math.min(1, e.gamma / 30));
        mouse.y = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
      }
    }, { passive: true });
  }
}

/* Raycaster for mouse-particle repulsion */
const raycaster = new THREE.Raycaster();
const mousePlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
const mouseWorld = new THREE.Vector3();

/* ── Lighting — 7 cinematic lights ── */
scene.add(new THREE.AmbientLight(0x060606, 0.4));

const keyL = new THREE.PointLight(0xC9A84C, 5, 30);
keyL.position.set(3, 2.5, 5);
scene.add(keyL);

const fillL = new THREE.PointLight(0xFFD700, 2.5, 22);
fillL.position.set(-3, 3, 4);
scene.add(fillL);

const rim1L = new THREE.PointLight(0xC9A84C, 3, 16);
rim1L.position.set(-4, -1, 1);
scene.add(rim1L);

const rim2L = new THREE.PointLight(0x8B6914, 2, 22);
rim2L.position.set(4, -3, 2);
scene.add(rim2L);

const topL = new THREE.PointLight(0xFFD700, 1.2, 28);
topL.position.set(0, 6, 3);
scene.add(topL);

const backL = new THREE.PointLight(0xC9A84C, 2, 18);
backL.position.set(0, -1, -4);
scene.add(backL);

const frontFillL = new THREE.PointLight(0xC9A84C, 1, 15);
frontFillL.position.set(0, 0, 8);
scene.add(frontFillL);

/* Base light positions for mouse-reactive shifting */
const lightBases = [
  { light: keyL, base: new THREE.Vector3(3, 2.5, 5) },
  { light: fillL, base: new THREE.Vector3(-3, 3, 4) },
  { light: rim1L, base: new THREE.Vector3(-4, -1, 1) },
  { light: rim2L, base: new THREE.Vector3(4, -3, 2) },
  { light: topL, base: new THREE.Vector3(0, 6, 3) },
  { light: backL, base: new THREE.Vector3(0, -1, -4) },
  { light: frontFillL, base: new THREE.Vector3(0, 0, 8) }
];

/* ── Gold material — shared across all logo pieces ── */
const goldMat = new THREE.MeshStandardMaterial({
  color: 0xC9A84C,
  metalness: 0.94,
  roughness: 0.13,
  emissive: 0x4A3510,
  emissiveIntensity: 0.3
});

/* ── Logo mark — three 3D pieces ── */
const logo = new THREE.Group();
const R = 2.0;

/* C arc — 220° sweep, thick tube */
const cGeo = new THREE.TorusGeometry(R, 0.14, 48, 150, Math.PI * 1.222);
const cMesh = new THREE.Mesh(cGeo, goldMat);
cMesh.rotation.z = Math.PI * 0.5 + Math.PI * 0.611;
logo.add(cMesh);

/* O arc — 140° sweep, thin tube */
const oGeo = new THREE.TorusGeometry(R, 0.04, 24, 80, Math.PI * 0.778);
const oMesh = new THREE.Mesh(oGeo, goldMat);
oMesh.rotation.z = Math.PI * 0.5 + Math.PI * 0.611 + Math.PI * 1.222;
logo.add(oMesh);

/* G element — extruded ┐ shape */
const gShape = new THREE.Shape();
const hLen = R * 0.35, vLen = R * 0.32, gW = 0.05, barH = 0.04;
gShape.moveTo(0, barH);
gShape.lineTo(hLen, barH);
gShape.lineTo(hLen, -vLen);
gShape.lineTo(hLen - gW, -vLen);
gShape.lineTo(hLen - gW, -barH);
gShape.lineTo(0, -barH);
gShape.lineTo(0, barH);
const gGeo = new THREE.ExtrudeGeometry(gShape, {
  depth: 0.08,
  bevelEnabled: true,
  bevelThickness: 0.018,
  bevelSize: 0.018,
  bevelSegments: 4
});
const gMesh = new THREE.Mesh(gGeo, goldMat);
const endX = R * Math.cos(70 * Math.PI / 180);
gMesh.position.set(endX - hLen, 0, -0.04);
logo.add(gMesh);
scene.add(logo);

/* ── Particle System — Two Layers ── */

/* Shader shared by both layers */
const particleVert = `
  attribute float size;
  varying float vAlpha;
  void main() {
    vec4 mv = modelViewMatrix * vec4(position, 1.0);
    float d = -mv.z;
    vAlpha = clamp(1.0 - d / 40.0, 0.03, 0.6);
    gl_PointSize = size * (6.0 / max(d, 0.5));
    gl_Position = projectionMatrix * mv;
  }
`;
const particleFrag = `
  varying float vAlpha;
  void main() {
    float d = length(gl_PointCoord - vec2(0.5));
    if (d > 0.5) discard;
    float a = smoothstep(0.5, 0.05, d) * vAlpha;
    gl_FragColor = vec4(0.79, 0.66, 0.30, a);
  }
`;

/* Layer 1: Close atmospheric particles (300) */
const p1Count = 300;
const p1Geo = new THREE.BufferGeometry();
const p1Pos = new Float32Array(p1Count * 3);
const p1Sizes = new Float32Array(p1Count);
const p1Base = new Float32Array(p1Count * 3); // base positions for repulsion return
const p1Speeds = new Float32Array(p1Count * 3); // per-axis drift speeds

for (let i = 0; i < p1Count; i++) {
  // Spread in a shell radius 6-12
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 6 + Math.random() * 6;
  const x = r * Math.sin(phi) * Math.cos(theta);
  const y = r * Math.sin(phi) * Math.sin(theta);
  const z = r * Math.cos(phi);
  p1Pos[i * 3] = x;
  p1Pos[i * 3 + 1] = y;
  p1Pos[i * 3 + 2] = z;
  p1Base[i * 3] = x;
  p1Base[i * 3 + 1] = y;
  p1Base[i * 3 + 2] = z;
  p1Sizes[i] = 1.5 + Math.random() * 2.5;
  p1Speeds[i * 3] = 0.003 + Math.random() * 0.005;
  p1Speeds[i * 3 + 1] = 0.003 + Math.random() * 0.005;
  p1Speeds[i * 3 + 2] = 0.003 + Math.random() * 0.005;
}
p1Geo.setAttribute('position', new THREE.BufferAttribute(p1Pos, 3));
p1Geo.setAttribute('size', new THREE.BufferAttribute(p1Sizes, 1));

const p1Mat = new THREE.ShaderMaterial({
  vertexShader: particleVert,
  fragmentShader: particleFrag,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});
const p1Points = new THREE.Points(p1Geo, p1Mat);
scene.add(p1Points);

/* Layer 2: Deep space dust (800) */
const p2Count = 800;
const p2Geo = new THREE.BufferGeometry();
const p2Pos = new Float32Array(p2Count * 3);
const p2Sizes = new Float32Array(p2Count);
const p2Speeds = new Float32Array(p2Count);

for (let i = 0; i < p2Count; i++) {
  p2Pos[i * 3] = (Math.random() - 0.5) * 80;
  p2Pos[i * 3 + 1] = (Math.random() - 0.5) * 80;
  p2Pos[i * 3 + 2] = (Math.random() - 0.5) * 120;
  p2Sizes[i] = 0.3 + Math.random() * 1.2;
  p2Speeds[i] = 0.2 + Math.random() * 0.8;
}
p2Geo.setAttribute('position', new THREE.BufferAttribute(p2Pos, 3));
p2Geo.setAttribute('size', new THREE.BufferAttribute(p2Sizes, 1));

const p2Mat = new THREE.ShaderMaterial({
  vertexShader: particleVert,
  fragmentShader: particleFrag,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});
scene.add(new THREE.Points(p2Geo, p2Mat));

/* ── Camera transition state ── */
let state = 'idle', transStart = 0;
const TRANS_DUR = 3500;
const camStart = new THREE.Vector3(0, 0, 5);
const camEnd = new THREE.Vector3(0.3, 0, -50);
const cp1 = new THREE.Vector3(2, 1, -8);
const cp2 = new THREE.Vector3(-1.5, -0.8, -32);
const rcp1 = new THREE.Vector3(-1.5, -0.8, -32);
const rcp2 = new THREE.Vector3(2, 1, -8);

function cubicBezier(t, p0, p1, p2, p3) {
  const m = 1 - t;
  return new THREE.Vector3(
    m * m * m * p0.x + 3 * m * m * t * p1.x + 3 * m * t * t * p2.x + t * t * t * p3.x,
    m * m * m * p0.y + 3 * m * m * t * p1.y + 3 * m * t * t * p2.y + t * t * t * p3.y,
    m * m * m * p0.z + 3 * m * m * t * p1.z + 3 * m * t * t * p2.z + t * t * t * p3.z
  );
}

function easeInOutQuart(t) {
  return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
}

function enterContact() {
  if (state !== 'idle') return;
  state = 'transitioning';
  transStart = performance.now();
  document.getElementById('wordmark').className = 'wordmark hide';
  document.getElementById('status').className = 'status hide';
  document.getElementById('cta-wrap').className = 'cta-wrap hide';
  setTimeout(() => {
    document.getElementById('contact').classList.add('active');
    document.getElementById('back').classList.add('show');
    state = 'contact';
  }, TRANS_DUR);
}

function exitContact() {
  if (state !== 'contact') return;
  state = 'returning';
  transStart = performance.now();
  document.getElementById('contact').classList.remove('active');
  document.getElementById('back').classList.remove('show');
  setTimeout(() => {
    document.getElementById('wordmark').className = 'wordmark show';
    document.getElementById('status').className = 'status show';
    document.getElementById('cta-wrap').className = 'cta-wrap show';
    state = 'idle';
  }, TRANS_DUR);
}

function sendForm() {
  const n = document.getElementById('f-name').value;
  const e = document.getElementById('f-email').value;
  const m = document.getElementById('f-msg').value;
  if (!n || !e) return;
  const s = encodeURIComponent('New project inquiry from ' + n);
  const b = encodeURIComponent('Name: ' + n + '\nEmail: ' + e + '\n\n' + m);
  window.location.href = 'mailto:jon@jgoldco.com?subject=' + s + '&body=' + b;
  document.getElementById('fields').className = 'fields hide';
  document.getElementById('success').className = 'success show';
}

/* ── Reveal sequence ── */
setTimeout(() => document.getElementById('wordmark').classList.add('show'), 2000);
setTimeout(() => document.getElementById('status').classList.add('show'), 3500);
setTimeout(() => document.getElementById('cta-wrap').classList.add('show'), 4000);

/* ── Animation loop ── */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  /* Smooth mouse lerp */
  if (!isMobile) {
    smoothMouse.x += (mouse.x - smoothMouse.x) * 0.03;
    smoothMouse.y += (mouse.y - smoothMouse.y) * 0.03;
  } else {
    smoothMouse.x += (mouse.x - smoothMouse.x) * 0.05;
    smoothMouse.y += (mouse.y - smoothMouse.y) * 0.05;
  }

  /* Logo animation — majestic rotation + mouse response */
  logo.rotation.y = t * 0.08;
  logo.rotation.x = Math.sin(t * 0.06) * 0.1 + smoothMouse.y * 0.15;
  logo.rotation.z = smoothMouse.x * 0.08;
  logo.position.y = Math.sin(t * 0.3) * 0.05;

  /* Raycaster for mouse-particle repulsion */
  raycaster.setFromCamera(new THREE.Vector2(mouse.x, mouse.y), camera);
  raycaster.ray.intersectPlane(mousePlane, mouseWorld);

  /* Layer 1: Close particles — drift + mouse repulsion */
  const pp1 = p1Geo.attributes.position.array;
  for (let i = 0; i < p1Count; i++) {
    const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;

    // Gentle drift from base position
    const driftX = Math.sin(t * p1Speeds[ix] * 100 + i * 1.7) * 0.5;
    const driftY = Math.cos(t * p1Speeds[iy] * 100 + i * 2.3) * 0.5;
    const driftZ = Math.sin(t * p1Speeds[iz] * 100 + i * 3.1) * 0.3;

    let targetX = p1Base[ix] + driftX;
    let targetY = p1Base[iy] + driftY;
    let targetZ = p1Base[iz] + driftZ;

    // Mouse repulsion
    const dx = pp1[ix] - mouseWorld.x;
    const dy = pp1[iy] - mouseWorld.y;
    const dz = pp1[iz] - mouseWorld.z;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

    if (dist < 2.0 && dist > 0.01) {
      const force = (2.0 - dist) * 0.02;
      targetX += (dx / dist) * force * 30;
      targetY += (dy / dist) * force * 30;
      targetZ += (dz / dist) * force * 15;
    }

    // Lerp toward target (smooth return)
    pp1[ix] += (targetX - pp1[ix]) * 0.02;
    pp1[iy] += (targetY - pp1[iy]) * 0.02;
    pp1[iz] += (targetZ - pp1[iz]) * 0.02;
  }
  p1Geo.attributes.position.needsUpdate = true;

  /* Layer 2: Deep space dust — gentle drift only */
  const pp2 = p2Geo.attributes.position.array;
  for (let i = 0; i < p2Count; i++) {
    pp2[i * 3 + 1] += Math.sin(t * 0.15 + i * 0.5) * 0.003 * p2Speeds[i];
    pp2[i * 3] += Math.cos(t * 0.1 + i * 0.3) * 0.002 * p2Speeds[i];
    pp2[i * 3 + 2] += Math.sin(t * 0.08 + i * 0.7) * 0.001 * p2Speeds[i];
  }
  p2Geo.attributes.position.needsUpdate = true;

  /* Camera states */
  if (state === 'idle') {
    // Mouse parallax + breathing
    camera.position.x = smoothMouse.x * 0.8 + Math.sin(t * 0.06) * 0.15;
    camera.position.y = smoothMouse.y * 0.5 + Math.cos(t * 0.04) * 0.1;
    camera.position.z = 5 + Math.sin(t * 0.25) * 0.15;
    camera.lookAt(0, 0, 0);

    // Dynamic light positions — shift with mouse for living reflections
    for (const lb of lightBases) {
      lb.light.position.x = lb.base.x + smoothMouse.x * 0.5;
      lb.light.position.y = lb.base.y + smoothMouse.y * 0.3;
      lb.light.position.z = lb.base.z;
    }
  } else if (state === 'transitioning') {
    const elapsed = performance.now() - transStart;
    const progress = Math.min(elapsed / TRANS_DUR, 1);
    const e = easeInOutQuart(progress);
    const pos = cubicBezier(e, camStart, cp1, cp2, camEnd);

    // Sine wobble during flight
    pos.x += Math.sin(progress * Math.PI * 3) * 0.4 * (1 - progress);
    pos.y += Math.sin(progress * Math.PI * 2.2) * 0.25 * (1 - progress);

    // Mouse parallax continues during flight
    pos.x += smoothMouse.x * 0.3 * (1 - progress);
    pos.y += smoothMouse.y * 0.2 * (1 - progress);

    camera.position.copy(pos);

    // Look slightly ahead on the curve
    const lookProgress = Math.min(e + 0.05, 1);
    const lookTarget = cubicBezier(lookProgress, camStart, cp1, cp2, camEnd);
    camera.lookAt(lookTarget);

    // Lights follow camera during transitions
    for (const lb of lightBases) {
      lb.light.position.x = lb.base.x + camera.position.x;
      lb.light.position.y = lb.base.y + camera.position.y;
      lb.light.position.z = lb.base.z + camera.position.z;
    }
  } else if (state === 'contact') {
    // Gentle drift at destination
    camera.position.x = 0.3 + Math.sin(t * 0.03) * 0.2 + smoothMouse.x * 0.15;
    camera.position.y = Math.cos(t * 0.025) * 0.12 + smoothMouse.y * 0.1;
    camera.position.z = -50;
    camera.lookAt(0, 0, -55);

    for (const lb of lightBases) {
      lb.light.position.x = lb.base.x + camera.position.x;
      lb.light.position.y = lb.base.y + camera.position.y;
      lb.light.position.z = lb.base.z + camera.position.z;
    }
  } else if (state === 'returning') {
    const elapsed = performance.now() - transStart;
    const progress = Math.min(elapsed / TRANS_DUR, 1);
    const e = easeInOutQuart(progress);
    const pos = cubicBezier(e, camEnd, rcp1, rcp2, camStart);

    pos.x += Math.sin(e * Math.PI * 2) * 0.3 * e;
    pos.y += Math.sin(e * Math.PI * 1.5) * 0.2 * e;

    camera.position.copy(pos);

    const lookProgress = Math.min(e + 0.05, 1);
    const lookTarget = cubicBezier(lookProgress, camEnd, rcp1, rcp2, camStart);
    camera.lookAt(lookTarget);

    for (const lb of lightBases) {
      lb.light.position.x = lb.base.x + camera.position.x;
      lb.light.position.y = lb.base.y + camera.position.y;
      lb.light.position.z = lb.base.z + camera.position.z;
    }
  }

  renderer.render(scene, camera);
}
animate();

/* ── Resize handler ── */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
